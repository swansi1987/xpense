version: "3.8"

services:
  xpense:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - PUBLIC_URL=http://localhost:3000
      - DATABASE_URL=file:/app/data/xpense.db
      # Add SESSION_SECRET=... for extra security if extending auth
    restart: unless-stopped
    volumes:
      # Persist SQLite database across container restarts/recreates
      - ./data:/app/data
